version: "3.8"

services:
  # the Streamlit ML app
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus_backend
    ports:
      - "8501:8501"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # nginx sitting in front of the app
  frontend:
    image: nginx:alpine
    container_name: bus_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
